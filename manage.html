<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Channel Manager — Bongo Flex</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e50914;
      --dark: #141414;
      --card: #1e1e1e;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --muted: #888;
      --gold: #f5c518;
      --green: #2ecc71;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Hind Siliguri', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #0a0a0a;
      border-bottom: 2px solid var(--red);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 20px; font-weight: 700; color: var(--red); letter-spacing: 1px; }
    .logo span { color: var(--text); }
    .header-stats { font-size: 13px; color: var(--muted); }
    .btn-site {
      background: var(--red);
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn-site:hover { background: #c40812; }

    /* ── Main Layout ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    /* ── Add Channel Form ── */
    .add-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .add-card h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--green); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-row.single { grid-template-columns: 1fr; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    input, select {
      width: 100%;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, select:focus { border-color: var(--red); }
    select option { background: #111; }
    .btn-add {
      background: var(--green);
      color: #111;
      border: none;
      padding: 10px 28px;
      border-radius: 7px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
      transition: opacity .2s;
    }
    .btn-add:hover { opacity: .85; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .search-box {
      flex: 1;
      min-width: 180px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }
    .search-box:focus { border-color: var(--red); }
    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 14px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .filter-btn.active { border-color: var(--red); color: var(--red); }
    .btn-reset {
      background: #333;
      color: var(--muted);
      border: none;
      padding: 9px 16px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-reset:hover { color: var(--text); }

    /* ── Channel Table ── */
    .ch-count { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .ch-table { width: 100%; border-collapse: collapse; }
    .ch-table thead tr {
      background: #111;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .ch-table th, .ch-table td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .ch-table tbody tr { transition: background .15s; }
    .ch-table tbody tr:hover { background: #1a1a1a; }
    .ch-table tbody tr.highlighted { background: rgba(245,197,24,0.06); border-left: 3px solid var(--gold); }

    .ch-logo { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; background: #222; }
    .ch-name { font-size: 14px; font-weight: 600; }
    .ch-cat {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      background: #2a2a2a;
      color: var(--muted);
    }
    .highlight-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(245,197,24,0.15);
      color: var(--gold);
      font-weight: 600;
    }

    /* action buttons */
    .actions { display: flex; gap: 6px; }
    .btn-hl, .btn-del, .btn-edit {
      border: none;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: opacity .2s;
    }
    .btn-hl { background: rgba(245,197,24,0.15); color: var(--gold); }
    .btn-hl:hover { background: rgba(245,197,24,0.28); }
    .btn-hl.on { background: var(--gold); color: #111; }
    .btn-del { background: rgba(229,9,20,0.15); color: #ff6b6b; }
    .btn-del:hover { background: rgba(229,9,20,0.28); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      transition: transform .3s ease;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error { border-color: #ff6b6b; color: #ff6b6b; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 15px; }

    /* Responsive */
    @media(max-width:600px) {
      .form-row { grid-template-columns: 1fr; }
      .ch-table th:nth-child(4), .ch-table td:nth-child(4) { display: none; }
      .actions { flex-direction: column; }
    }
  </style>
</head>

<header>
  <div class="logo">Bongo<span>Flex</span> <span style="font-size:12px;color:var(--muted);font-weight:400;">Manager</span></div>
  <div class="header-stats" id="headerStats"></div>
  <a href="index.html" class="btn-site">📺 সাইট দেখুন</a>
</header>

<div class="container">

  <!-- ── Add Channel ── -->
  <div class="add-card">
    <h2>➕ নতুন চ্যানেল যোগ করুন</h2>
    <div class="form-row">
      <div>
        <label>চ্যানেলের নাম *</label>
        <input type="text" id="f_name" placeholder="যেমন: Zee Bangla HD"/>
      </div>
      <div>
        <label>ক্যাটাগরি *</label>
        <select id="f_cat">
          <option value="">-- বেছে নিন --</option>
          <option>Bangla</option>
          <option>Sports</option>
          <option>News</option>
          <option>Entertainment</option>
          <option>Hindi</option>
          <option>Hindi Movies</option>
          <option>Movies</option>
          <option>Music</option>
          <option>Kids</option>
          <option>Documentary</option>
          <option>English</option>
          <option>Religious</option>
          <option>Infotainment</option>
          <option>Weather</option>
          <option>Latest</option>
        </select>
      </div>
    </div>
    <div class="form-row single">
      <div>
        <label>স্ট্রিম URL (m3u8) *</label>
        <input type="url" id="f_url" placeholder="https://example.com/stream/index.m3u8"/>
      </div>
    </div>
    <div class="form-row single">
      <div>
        <label>লোগো URL (ছবির লিংক)</label>
        <input type="url" id="f_logo" placeholder="https://example.com/logo.png (না দিলে খালি রাখুন)"/>
      </div>
    </div>
    <button class="btn-add" onclick="addChannel()">✅ চ্যানেল যোগ করুন</button>
  </div>

  <!-- ── Toolbar ── -->
  <div class="toolbar">
    <input class="search-box" type="text" id="searchInput" placeholder="🔍 চ্যানেল খুঁজুন..." oninput="renderList()"/>
    <button class="filter-btn" id="filterHL" onclick="toggleFilter('hl')">⭐ হাইলাইট</button>
    <select class="filter-btn" id="filterCat" onchange="renderList()" style="padding:9px 12px;">
      <option value="">সব ক্যাটাগরি</option>
      <option>Bangla</option><option>Sports</option><option>News</option>
      <option>Entertainment</option><option>Hindi</option><option>Hindi Movies</option>
      <option>Movies</option><option>Music</option><option>Kids</option>
      <option>Documentary</option><option>English</option><option>Religious</option>
      <option>Infotainment</option><option>Weather</option><option>Latest</option>
    </select>
    <button class="btn-reset" onclick="resetAll()" title="সব রিসেট করুন (ডিফল্টে ফিরে যাবে)">🔄 রিসেট</button>
  </div>

  <div class="ch-count" id="chCount"></div>

  <!-- ── Channel Table ── -->
  <table class="ch-table">
    <thead>
      <tr>
        <th style="width:50px">লোগো</th>
        <th>নাম</th>
        <th>ক্যাটাগরি</th>
        <th>স্ট্যাটাস</th>
        <th style="width:160px">অ্যাকশন</th>
      </tr>
    </thead>
    <tbody id="chBody"></tbody>
  </table>
  <div id="emptyState" class="empty" style="display:none">কোনো চ্যানেল পাওয়া যায়নি।</div>

</div>

<!-- Toast -->
<div id="toast"></div>

/* =============================================
   STATE
   ============================================= */
let channels = loadChannels();
let filterHL = false;

function loadChannels() {
  try {
    const saved = localStorage.getItem('bf_ch');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_CHANNELS));
}

function saveChannels() {
  localStorage.setItem('bf_ch', JSON.stringify(channels));
}

/* =============================================
   ADD CHANNEL
   ============================================= */
function addChannel() {
  const name = document.getElementById('f_name').value.trim();
  const cat  = document.getElementById('f_cat').value;
  const url  = document.getElementById('f_url').value.trim();
  const logo = document.getElementById('f_logo').value.trim();

  if (!name) { toast('চ্যানেলের নাম দিন!', 'error'); return; }
  if (!cat)  { toast('ক্যাটাগরি বেছে নিন!', 'error'); return; }
  if (!url)  { toast('স্ট্রিম URL দিন!', 'error'); return; }

  // Check duplicate
  if (channels.find(c => c.name.toLowerCase() === name.toLowerCase())) {
    toast('এই নামে চ্যানেল আগে থেকেই আছে!', 'error'); return;
  }

  const maxId = channels.reduce((m, c) => Math.max(m, c.id||0), 0);
  channels.push({ id: maxId + 1, name, cat, logo, url, fifa: false });
  saveChannels();
  renderList();
  updateStats();

  // Clear form
  document.getElementById('f_name').value = '';
  document.getElementById('f_cat').value = '';
  document.getElementById('f_url').value = '';
  document.getElementById('f_logo').value = '';

  toast('✅ "' + name + '" যোগ হয়েছে! সাইটে সাথে সাথে দেখাবে।', 'success');
}

/* =============================================
   TOGGLE HIGHLIGHT
   ============================================= */
function toggleHighlight(id) {
  const ch = channels.find(c => c.id === id);
  if (!ch) return;
  ch.fifa = !ch.fifa;
  saveChannels();
  renderList();
  toast(ch.fifa ? '⭐ "' + ch.name + '" হাইলাইট করা হয়েছে!' : '🔘 হাইলাইট সরানো হয়েছে।', 'success');
}

/* =============================================
   DELETE CHANNEL
   ============================================= */
function deleteChannel(id) {
  const ch = channels.find(c => c.id === id);
  if (!ch) return;
  if (!confirm('"' + ch.name + '" চ্যানেলটি মুছে ফেলবেন?')) return;
  channels = channels.filter(c => c.id !== id);
  saveChannels();
  renderList();
  updateStats();
  toast('🗑️ "' + ch.name + '" মুছে ফেলা হয়েছে।', 'success');
}

/* =============================================
   RESET
   ============================================= */
function resetAll() {
  if (!confirm('সব পরিবর্তন বাতিল করে ডিফল্ট চ্যানেল লিস্টে ফিরে যাবেন?')) return;
  localStorage.removeItem('bf_ch');
  channels = JSON.parse(JSON.stringify(DEFAULT_CHANNELS));
  saveChannels();
  renderList();
  updateStats();
  toast('🔄 ডিফল্ট লিস্টে ফিরে এসেছেন।', 'success');
}

/* =============================================
   FILTER
   ============================================= */
function toggleFilter(type) {
  if (type === 'hl') {
    filterHL = !filterHL;
    document.getElementById('filterHL').classList.toggle('active', filterHL);
    renderList();
  }
}

/* =============================================
   RENDER
   ============================================= */
function getFiltered() {
  let list = [...channels];
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const cat = document.getElementById('filterCat').value;
  if (q)   list = list.filter(c => c.name.toLowerCase().includes(q) || (c.cat||'').toLowerCase().includes(q));
  if (cat) list = list.filter(c => c.cat === cat);
  if (filterHL) list = list.filter(c => c.fifa);
  return list;
}

function renderList() {
  const list = getFiltered();
  const tbody = document.getElementById('chBody');
  const empty = document.getElementById('emptyState');

  document.getElementById('chCount').textContent = list.length + ' টি চ্যানেল দেখাচ্ছে';

  if (!list.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = list.map(ch => `
    <tr class="${ch.fifa ? 'highlighted' : ''}">
      <td>
        <img class="ch-logo" src="${ch.logo || 'https://img.icons8.com/color/96/tv.png'}"
             onerror="this.src='https://img.icons8.com/color/96/tv.png'" alt="${ch.name}"/>
      </td>
      <td><div class="ch-name">${ch.name}</div></td>
      <td><span class="ch-cat">${ch.cat || '-'}</span></td>
      <td>${ch.fifa ? '<span class="highlight-badge">⭐ হাইলাইট</span>' : '<span style="color:#555;font-size:12px;">—</span>'}</td>
      <td>
        <div class="actions">
          <button class="btn-hl ${ch.fifa ? 'on' : ''}" onclick="toggleHighlight(${ch.id})">${ch.fifa ? '★ হাইলাইট' : '☆ হাইলাইট'}</button>
          <button class="btn-del" onclick="deleteChannel(${ch.id})">🗑 ডিলিট</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function updateStats() {
  const total = channels.length;
  const hl = channels.filter(c => c.fifa).length;
  document.getElementById('headerStats').textContent = `মোট ${total} চ্যানেল · ${hl} হাইলাইট`;
}

/* =============================================
   TOAST
   ============================================= */
let toastTimer;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type||'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

/* =============================================
   INIT
   ============================================= */
renderList();
updateStats();
</script>
</body>
</html>
